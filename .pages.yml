# ============================================================================
# Pages CMS 2.0 Configuration — Draftlab.org
# Documentation: https://pagescms.org/docs/configuration/
# ============================================================================

settings:
  content:
    merge: true  # preserve keys not managed by CMS
  commit:
    templates:
      create: "Create {path} (via Pages CMS)"
      update: "Update {path} (via Pages CMS)"

# ============================================================================
# MEDIA
# ============================================================================
media:
  - name: images
    label: All Images
    input: src/assets
    output: /src/assets

# ============================================================================
# REUSABLE COMPONENTS
# ============================================================================
components:
  # --------------------------------------------------------------------------
  # Primitives
  # --------------------------------------------------------------------------

  button:
    type: object
    fields:
      - name: variant
        label: Variant
        type: select
        options:
          values:
            - label: Primary
              name: primary
            - label: Secondary
              name: secondary
            - label: Outline
              name: outline
            - label: Ghost
              name: ghost
        required: true
        default: primary
      - name: size
        label: Size
        type: select
        options:
          values:
            - label: Small
              name: sm
            - label: Medium
              name: md
            - label: Large
              name: lg
        required: true
        default: md
      - name: text
        label: Text
        type: string
        required: true
        description: The text displayed on the button
      - name: href
        label: Link URL
        type: string
        required: true
        description: The URL this button links to

  card:
    type: object
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: content
        label: Content
        type: rich-text
        description: Brief description of the card
      - name: image
        label: Image
        type: image
        description: Card image (absolute path, e.g. /src/assets/images/card.jpg)
      - name: color
        label: Color
        type: select
        options:
          values:
            - label: Primary
              name: primary
            - label: Secondary
              name: secondary
            - label: Highlight
              name: highlight
            - label: Neutral
              name: neutral
        description: Card color theme
      - name: button
        label: Button
        component: button

  # --------------------------------------------------------------------------
  # Navigation
  # --------------------------------------------------------------------------

  flexible_link:
    type: block
    blockKey: type
    description: Link that can reference an internal page or external URL
    blocks:
      - name: internal
        label: Internal Page Link
        fields:
          - name: pageRef
            label: Page Reference
            type: reference
            required: true
            options:
              collection: pages
              value: '/{permalink}'
              label: '{title} (/{permalink})'
            description: Select a page from the pages collection

      - name: external
        label: External Link
        fields:
          - name: url
            label: External URL
            type: string
            required: true
            description: Full URL (e.g. https://example.com)
            pattern:
              message: 'Must be a valid URL starting with http:// or https://'
              regex: '^https?://.+'

  navigation_menu_item:
    type: block
    blockKey: type
    description: Navigation item that can be a single link or a dropdown menu
    blocks:
      - name: link
        label: Single Link
        fields:
          - name: label
            label: Link Label
            type: string
            required: true
          - name: link
            label: Link
            component: flexible_link
            required: true
          - name: description
            label: Description
            type: string
            description: Optional description for accessibility

      - name: dropdown
        label: Dropdown Menu
        fields:
          - name: label
            label: Menu Label
            type: string
            required: true
          - name: children
            label: Menu Links
            type: object
            list: true
            required: true
            fields:
              - name: label
                label: Link Label
                type: string
                required: true
              - name: link
                label: Link
                component: flexible_link
                required: true
              - name: description
                label: Description
                type: string

  # --------------------------------------------------------------------------
  # Layout
  # --------------------------------------------------------------------------

  background_select:
    type: object
    fields:
      - name: bgColor
        label: Color
        type: select
        options:
          values:
            - label: White
              name: white
            - label: Gray
              name: gray
            - label: Gradient
              name: gradient
        default: white
      - name: bgType
        label: Type
        type: select
        options:
          values:
            - label: Full-width
              name: full
            - label: Contained
              name: contained
        default: full

  # --------------------------------------------------------------------------
  # Section components
  # --------------------------------------------------------------------------

  hero_section:
    type: object
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: subtitle
        label: Subtitle
        type: string
      - name: backgroundImage
        label: Background Image
        type: image

  richtext_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: withTOC
        label: Include Table of Contents
        type: boolean
        default: false
      - name: content
        label: Content
        type: rich-text
        required: true
        description: Markdown content for this section

  button_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: title
        label: Title (Optional)
        type: string
        required: false
      - name: buttons
        label: Buttons
        component: button
        list: true

  card_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: rich-text
      - name: cards
        label: Cards
        component: card
        list: true
      - name: buttons
        label: Action Buttons
        component: button
        list: true

  people_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: category
        label: Category
        type: string
        description: Filter people by section (e.g. "Team"). Leave empty to show all.

  # --- Draftlab-specific section components ---

  framework_section:
    type: object
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: string
      - name: showProjects
        label: Show Project Tags
        type: boolean
        default: true
        description: Display project name tags inside matrix cells

  projects_roll_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: title
        label: Title
        type: string
        default: Featured projects
      - name: description
        label: Description
        type: string
      - name: limit
        label: Number of Projects
        type: number
        description: How many projects to show. Leave empty to show all.
      - name: filterPhase
        label: Filter by Phase
        type: select
        options:
          values:
            - label: Understand
              name: understand
            - label: Define
              name: define
            - label: Build
              name: build
            - label: Sustain
              name: sustain
        description: Only show projects in this phase. Leave empty to show all.
      - name: filterModality
        label: Filter by Modality
        type: select
        options:
          values:
            - label: Clinic
              name: clinic
            - label: Studio
              name: studio
            - label: Council
              name: council
        description: Only show projects using this modality. Leave empty to show all.
      - name: featuredOnly
        label: Featured Only
        type: boolean
        default: false

  phases_overview_section:
    type: object
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: string

  modalities_overview_section:
    type: object
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: string

  organisations_roll_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: string
      - name: filterType
        label: Filter by Type
        type: select
        options:
          values:
            - label: Client
              name: client
            - label: Partner
              name: partner
            - label: Funder
              name: funder
        description: Only show organisations of this type. Leave empty to show all.
      - name: limit
        label: Limit
        type: number

  flexi_section:
    type: object
    fields:
      - name: background
        label: Section Background
        component: background_select
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: rich-text
      - name: sections
        label: Nested Sections
        component: section
        list: true

  # Subset of section types allowed inside flexi sections
  section:
    type: block
    blockKey: type
    blocks:
      - name: richText
        label: Rich Text Section
        component: richtext_section
      - name: button
        label: Button Section
        component: button_section
      - name: card
        label: Card Section
        component: card_section

# ============================================================================
# CONTENT COLLECTIONS
# ============================================================================
content:
  # --------------------------------------------------------------------------
  # Pages
  # --------------------------------------------------------------------------
  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    format: yaml
    filename: '{fields.permalink}.yaml'
    view:
      fields: [title, description, status]
      primary: title
    fields:
      - name: title
        label: Page Title
        type: string
        required: true

      - name: permalink
        label: Permalink
        type: string
        required: true
        description: The slug, without slashes (e.g. 'about' or 'work').
        pattern:
          message: "Must be a web-safe string like 'about' or 'work'."
          regex: '^[a-zA-Z0-9_-]*$'

      - name: status
        label: Status
        type: select
        required: true
        default: draft
        options:
          values:
            - label: Draft
              name: draft
            - label: Published
              name: published
            - label: Archived
              name: archived

      - name: description
        label: Page Description
        type: string
        description: SEO meta description

      - name: heroImage
        label: Hero Image
        type: image

      - name: background
        label: Page Background
        type: select
        default: white
        options:
          values:
            - label: White
              name: white
            - label: Gray
              name: gray
            - label: Gradient
              name: gradient
            - label: Highlight
              name: highlight

      - name: sections
        label: Page Sections
        type: block
        list:
          collapsible:
            collapsed: true
            summary: "{type}"
        required: true
        blockKey: type
        description: Add and arrange page sections in any order
        blocks:
          - name: hero
            label: Hero Section
            component: hero_section

          - name: richText
            label: Rich Text Section
            component: richtext_section

          - name: button
            label: Button Section
            component: button_section

          - name: card
            label: Card Section
            component: card_section

          - name: people
            label: People Section
            component: people_section

          - name: framework
            label: Framework Matrix
            component: framework_section

          - name: projectsRoll
            label: Projects Roll
            component: projects_roll_section

          - name: phasesOverview
            label: Phases Overview
            component: phases_overview_section

          - name: modalitiesOverview
            label: Modalities Overview
            component: modalities_overview_section

          - name: organisationsRoll
            label: Organisations Roll
            component: organisations_roll_section

          - name: flexi
            label: Flexi Section
            component: flexi_section

  # --------------------------------------------------------------------------
  # Projects
  # --------------------------------------------------------------------------
  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    format: json
    filename: '{fields.slug}.json'
    subfolders: false
    view:
      fields: [name, organisation, status]
      primary: name
      sort: [name, order]
    fields:
      - name: name
        label: Project Name
        type: string
        required: true

      - name: slug
        label: Slug
        type: string
        required: true
        description: URL-friendly identifier (e.g. gecko-project)
        pattern:
          message: "Must be a web-safe string like 'gecko-project'."
          regex: '^[a-zA-Z0-9_-]*$'

      - name: status
        label: Status
        type: select
        required: true
        default: draft
        options:
          values:
            - label: Draft
              name: draft
            - label: Published
              name: published
            - label: Archived
              name: archived

      - name: description
        label: Description
        type: text
        required: true

      - name: longDescription
        label: Long Description
        type: rich-text

      - name: organisation
        label: Organisation
        type: reference
        options:
          collection: organisations
          value: "{id}"
          label: "{fields.name}"

      - name: phases
        label: Phases
        type: select
        required: true
        options:
          multiple: true
          values:
            - label: Understand
              name: understand
            - label: Define
              name: define
            - label: Build
              name: build
            - label: Sustain
              name: sustain

      - name: modalities
        label: Modalities
        type: select
        required: true
        options:
          multiple: true
          values:
            - label: "Clinic ◎"
              name: clinic
            - label: "Studio ◈"
              name: studio
            - label: "Council ◉"
              name: council

      - name: startDate
        label: Start Date
        type: date
        options:
          format: yyyy-MM-dd

      - name: endDate
        label: End Date
        type: date
        options:
          format: yyyy-MM-dd

      - name: active
        label: Active
        type: boolean
        default: false
        description: Is this project currently active?

      - name: featured
        label: Featured
        type: boolean
        default: false
        description: Show in featured sections

      - name: image
        label: Image
        type: image

      - name: url
        label: Project URL
        type: string

      - name: order
        label: Display Order
        type: number
        default: 999

  # --------------------------------------------------------------------------
  # Organisations
  # --------------------------------------------------------------------------
  - name: organisations
    label: Organisations
    type: collection
    path: src/content/organisations
    format: json
    filename: '{fields.id}.json'
    subfolders: false
    view:
      fields: [name, type, status]
      sort: [type, name]
      search: [name, description]
      primary: name
    fields:
      - name: id
        label: ID
        type: string
        required: true
        readonly: true
        description: Unique identifier (slug format, e.g. gecko-project)

      - name: name
        label: Organisation Name
        type: string
        required: true

      - name: type
        label: Type
        type: select
        required: true
        options:
          values:
            - label: Client
              name: client
            - label: Partner
              name: partner
            - label: Funder
              name: funder

      - name: status
        label: Status
        type: select
        required: true
        default: draft
        options:
          values:
            - label: Draft
              name: draft
            - label: Published
              name: published
            - label: Archived
              name: archived

      - name: url
        label: Website URL
        type: string

      - name: description
        label: Description
        type: text

      - name: image
        label: Logo
        type: image
        description: Organisation logo (e.g. /src/assets/organisations/logo.svg)

      - name: projects
        label: Projects
        type: reference
        options:
          collection: projects
          multiple: true
          value: "{slug}"
          label: "{fields.name}"

      - name: order
        label: Display Order
        type: number
        default: 999

  # --------------------------------------------------------------------------
  # People
  # --------------------------------------------------------------------------
  - name: people
    label: People
    type: collection
    path: src/content/people
    format: json
    filename: '{fields.id}.json'
    subfolders: false
    view:
      fields: [headshot, name, title, status]
      primary: name
    fields:
      - name: id
        label: ID
        type: string
        required: true
        readonly: true
        description: Unique identifier (e.g. tin-geber)

      - name: name
        label: Name
        type: string
        required: true

      - name: status
        label: Status
        type: select
        required: true
        default: draft
        options:
          values:
            - label: Draft
              name: draft
            - label: Published
              name: published
            - label: Archived
              name: archived

      - name: headshot
        label: Headshot
        type: image
        required: true

      - name: title
        label: Job Title / Role
        type: string

      - name: role
        label: Practice Role
        type: string
        description: Role within Draftlab (e.g. Creative Director)

      - name: bio
        label: Bio
        type: text
        description: Short biography

      - name: affiliation
        label: Affiliation
        type: string

      - name: extraInfo
        label: Other/Previous Affiliations
        type: string

      - name: url
        label: Link
        type: string

      - name: sections
        label: Sections/Departments
        type: select
        required: true
        options:
          multiple: true
          values:
            - label: Team
              name: Team
            - label: Associates
              name: Associates

  # --------------------------------------------------------------------------
  # Phases (framework data)
  # --------------------------------------------------------------------------
  - name: phases
    label: Phases
    type: collection
    path: src/content/phases
    format: json
    filename: '{fields.slug}.json'
    subfolders: false
    view:
      fields: [name, number, status]
      primary: name
      sort: [order]
      default:
        sort: order
        order: asc
    fields:
      - name: name
        label: Name
        type: string
        required: true

      - name: number
        label: Number
        type: number
        required: true

      - name: slug
        label: Slug
        type: select
        required: true
        options:
          values:
            - label: Understand
              name: understand
            - label: Define
              name: define
            - label: Build
              name: build
            - label: Sustain
              name: sustain

      - name: tagline
        label: Tagline
        type: string
        required: true

      - name: subtitle
        label: Subtitle
        type: string
        required: true

      - name: description
        label: Description
        type: text
        required: true

      - name: color
        label: Color Token
        type: string
        required: true
        description: CSS color token name (e.g. phase-understand)

      - name: order
        label: Display Order
        type: number
        required: true

      - name: status
        label: Status
        type: select
        required: true
        default: published
        options:
          values:
            - label: Draft
              name: draft
            - label: Published
              name: published
            - label: Archived
              name: archived

  # --------------------------------------------------------------------------
  # Modalities (framework data)
  # --------------------------------------------------------------------------
  - name: modalities
    label: Modalities
    type: collection
    path: src/content/modalities
    format: json
    filename: '{fields.slug}.json'
    subfolders: false
    view:
      fields: [name, symbol, status]
      primary: name
      sort: [order]
      default:
        sort: order
        order: asc
    fields:
      - name: name
        label: Name
        type: string
        required: true

      - name: slug
        label: Slug
        type: select
        required: true
        options:
          values:
            - label: "Clinic ◎"
              name: clinic
            - label: "Studio ◈"
              name: studio
            - label: "Council ◉"
              name: council

      - name: symbol
        label: Symbol
        type: string
        required: true
        description: Unicode symbol (◎, ◈, or ◉)

      - name: tagline
        label: Tagline
        type: string
        required: true

      - name: description
        label: Description
        type: text
        required: true

      - name: distinguishingFeature
        label: Distinguishing Feature
        type: string
        required: true

      - name: order
        label: Display Order
        type: number
        required: true

      - name: status
        label: Status
        type: select
        required: true
        default: published
        options:
          values:
            - label: Draft
              name: draft
            - label: Published
              name: published
            - label: Archived
              name: archived

  # --------------------------------------------------------------------------
  # Framework Cells (12 phase x modality intersections)
  # --------------------------------------------------------------------------
  - name: frameworkCells
    label: Framework Cells
    type: collection
    path: src/content/frameworkCells
    format: json
    subfolders: false
    view:
      fields: [phase, modality, status]
      primary: phase
      sort: [order]
      default:
        sort: order
        order: asc
    fields:
      - name: phase
        label: Phase
        type: select
        required: true
        options:
          values:
            - label: Understand
              name: understand
            - label: Define
              name: define
            - label: Build
              name: build
            - label: Sustain
              name: sustain

      - name: modality
        label: Modality
        type: select
        required: true
        options:
          values:
            - label: Clinic
              name: clinic
            - label: Studio
              name: studio
            - label: Council
              name: council

      - name: description
        label: Description
        type: text
        required: true

      - name: order
        label: Display Order
        type: number
        required: true

      - name: status
        label: Status
        type: select
        required: true
        default: published
        options:
          values:
            - label: Draft
              name: draft
            - label: Published
              name: published
            - label: Archived
              name: archived

  # --------------------------------------------------------------------------
  # Categories
  # --------------------------------------------------------------------------
  - name: categories
    label: Categories
    type: collection
    path: src/content/categories
    format: json
    filename: '{fields.id}.json'
    subfolders: false
    view:
      fields: [name, id]
      primary: name
    fields:
      - name: id
        label: ID
        type: string
        required: true

      - name: name
        label: Name
        type: string
        required: true

      - name: categories
        label: Categories
        type: string
        list: true
        required: true

  # --------------------------------------------------------------------------
  # Site Settings (singleton)
  # --------------------------------------------------------------------------
  - name: site-config
    label: Site Settings
    type: file
    path: src/content/site/config.json
    fields:
      - name: title
        label: Site Title
        type: string
        required: true

      - name: description
        label: Site Description
        type: string
        required: true

      - name: url
        label: Site URL
        type: string
        required: true
        description: "Your website's URL (e.g. https://draftlab.org)"

      - name: favicon
        label: Favicon Path
        type: string
        default: /favicon.svg

      - name: defaultOgImage
        label: Default Open Graph Image
        type: image

      - name: defaultLogoLight
        label: Logo (Light Background)
        type: image

      - name: defaultLogoDark
        label: Logo (Dark Background)
        type: image

      - name: social
        label: Social Media Links
        type: object
        fields:
          - name: bluesky
            label: BlueSky URL
            type: string
          - name: mastodon
            label: Mastodon URL
            type: string
          - name: github
            label: GitHub URL
            type: string
          - name: linkedin
            label: LinkedIn URL
            type: string
          - name: x
            label: X URL
            type: string
          - name: facebook
            label: Facebook URL
            type: string
          - name: instagram
            label: Instagram URL
            type: string
          - name: youtube
            label: YouTube URL
            type: string

      - name: footer
        label: Footer
        type: object
        fields:
          - name: description
            label: Footer Description
            type: string
          - name: bottom
            label: Bottom Text
            type: string
            required: true
            description: Text shown at the bottom of the footer (supports markdown)

      - name: archivedBanner
        label: Archived Banner
        type: object
        fields:
          - name: message
            label: Message
            type: string
            required: true
          - name: color
            label: Color
            type: select
            required: true
            default: secondary
            options:
              values:
                - label: Primary
                  name: primary
                - label: Secondary
                  name: secondary
                - label: Highlight
                  name: highlight
                - label: Neutral
                  name: neutral

      - name: cookieConsent
        label: Cookie Consent
        type: object
        fields:
          - name: message
            label: Banner Message
            type: rich-text
            required: true
          - name: googleAnalyticsId
            label: Google Analytics Measurement ID
            type: string
            description: "GA4 Measurement ID (e.g. G-XXXXXXXXXX). Leave empty to disable."

  # --------------------------------------------------------------------------
  # Navigation Menus
  # --------------------------------------------------------------------------
  - name: navigation
    label: Navigation Menus
    type: collection
    path: src/content/navigation
    format: json
    filename: '{fields.slug}.json'
    subfolders: false
    view:
      fields: [title]
      primary: title
    fields:
      - name: slug
        label: Menu ID
        type: string
        required: true
        description: Unique identifier for this menu (e.g. main, footer-1)
        pattern:
          message: "Must be a web-safe string like 'main' or 'footer-1'."
          regex: '^[a-zA-Z0-9_-]*$'

      - name: title
        label: Menu Title
